<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Áreas del Proceso de Esterilización</title>

<style>
body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; }

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.map-container {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin-bottom: 20px;
}

.map-container img {
  width: 100%;
  border-radius: 10px;
  display: block;
}

/* Puntos interactivos */
.hotspot {
  position: absolute;
  width: 25px;
  height: 25px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px rgba(0,0,0,0.3);
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

.red { background: #e74c3c; }
.blue { background: #3498db; }
.green { background: #2ecc71; }

.info-box {
  width: 100%;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

aside {
  background: #eef6ff;
  padding: 10px;
  border-left: 5px solid #3498db;
  margin-top: 10px;
  border-radius: 6px;
}

iframe {
  margin-top: 15px;
  border-radius: 10px;
  width: 100%;
  height: 315px;
}

@media (max-width: 768px) {
  .hotspot { width: 20px; height: 20px; }
  iframe { height: 200px; }
}
</style>
</head>

<body>

<header>
<h1>Proceso de Esterilización Hospitalaria</h1>
</header>

<div class="container">

<div class="map-container">
<img src="mapa.png" alt="Mapa hospital">

<!-- 🔴 Área sucia (abajo izquierda) -->
<div class="hotspot red" style="top:75%; left:25%;" onclick="showInfo('sucia')"></div>

<!-- 🔵 Área limpia (centro) -->
<div class="hotspot blue" style="top:50%; left:50%;" onclick="showInfo('limpia')"></div>

<!-- 🟢 Almacén (arriba derecha) -->
<div class="hotspot green" style="top:25%; left:75%;" onclick="showInfo('almacen')"></div>

</div>

<div class="info-box" id="info">
Haz clic en un punto del mapa para ver información.
</div>

</div>

<script>
function showInfo(area) {
    const info = document.getElementById('info');

    if(area === 'sucia') {
        info.innerHTML = `
        <h2 style="color:#e74c3c">Área sucia</h2>
        <p>Aquí llega todo el material usado del hospital.</p>
        <p>Se clasifica, limpia, desinfecta y seca antes de continuar el proceso.</p>
        <p><strong>Clave:</strong> La humedad puede afectar la esterilización.</p>
        <aside><strong>Dato:</strong> Muchos instrumentos se desmontan para limpiarlos completamente.</aside>
        `;
    }

    if(area === 'limpia') {
        info.innerHTML = `
        <h2 style="color:#3498db">Área limpia</h2>
        <p>El material se revisa, se empaqueta y se prepara para esterilizar.</p>
        <p>Se utilizan autoclaves con vapor a alta presión.</p>
        <p><strong>Clave:</strong> El vapor elimina microorganismos rápidamente.</p>
        <aside><strong>Dato:</strong> Puede alcanzar hasta 134 ºC.</aside>
        <iframe src="https://www.youtube.com/embed/kWMK09Tko2o" frameborder="0" allowfullscreen></iframe>
        `;
    }

    if(area === 'almacen') {
        info.innerHTML = `
        <h2 style="color:#2ecc71">Almacenamiento</h2>
        <p>El material esterilizado se guarda en condiciones controladas.</p>
        <p>Desde aquí se distribuye a todo el hospital.</p>
        <p><strong>Clave:</strong> Acceso restringido para evitar contaminación.</p>
        `;
    }
}
</script>

</body>
</html>
